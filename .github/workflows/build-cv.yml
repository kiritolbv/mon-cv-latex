name: Build LaTeX CV

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Compile LaTeX
      uses: xu-cheng/texlive-action@v2
      with:
        commands: |
          pdflatex main.tex
          pdflatex main.tex

    - name: Upload PDF
      uses: actions/upload-artifact@v4
      with:
        name: cv-pdf
        path: main.pdf